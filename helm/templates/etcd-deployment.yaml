apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: multi-john
    app.kubernetes.io/component: etcd
  name: etcd
spec:
  replicas: {{ int .Values.etcd.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: multi-john
      app.kubernetes.io/component: etcd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multi-john
        app.kubernetes.io/component: etcd
    spec:
      containers:
        - command:
            - /usr/local/bin/etcd
          args:
            - --name=etcd
            - --data-dir=/etcd-data
            - --listen-client-urls=http://0.0.0.0:{{ .Values.etcd.port }}
            - --advertise-client-urls=http://etcd:{{ .Values.etcd.port }}
            - --listen-peer-urls=http://0.0.0.0:{{ .Values.etcd.peerPort }}
            - --initial-advertise-peer-urls=http://localhost:{{ .Values.etcd.peerPort }}
            - --initial-cluster=etcd=http://localhost:{{ .Values.etcd.peerPort }}
            - --initial-cluster-state=new
            - --log-level=info
            - --logger=zap
            - --log-outputs=stderr
          image: "{{ .Values.etcd.imageName }}"
          imagePullPolicy: {{ .Values.etcd.imagePullPolicy }}
          name: etcd
          ports:
            - name: client
              containerPort: {{ int .Values.etcd.port }}
            - name: peer
              containerPort: {{ int .Values.etcd.peerPort }}
          resources: 
              requests:
                memory: {{ .Values.etcd.requests.memory }}
                cpu: {{ .Values.etcd.requests.cpu }}
              limits:
                memory: {{ .Values.etcd.limits.memory }}
                cpu: {{ .Values.etcd.limits.cpu }}
          volumeMounts:
            - mountPath: /etcd-data
              name: data
      restartPolicy: Always
      volumes:
        - name: data
          emptyDir: {}
